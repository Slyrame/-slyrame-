<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="favicon.ico">
<title>[ slyrame ] — music</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; min-height:100vh; background:#ffffff; font-family:"Courier New",monospace; color:#111111; overflow-x:hidden; }

#back { position:fixed; top:14px; left:20px; font-size:11px; color:#111111; text-decoration:none; letter-spacing:2px; z-index:20; }
#back:hover { opacity:0.5; }
#donate { position:fixed; bottom:18px; right:20px; font-size:10px; color:#111111; text-decoration:none; letter-spacing:2px; border:1px solid rgba(0,0,0,0.12); padding:5px 10px; z-index:20; transition:opacity 0.2s; }
#donate:hover { opacity:0.5; }

/* ---- LAYOUT ---- */
#page {
  display:flex;
  flex-direction:row;
  min-height:100vh;
  width:100%;
}

/* BBS — fenetre Windows 97 */
#win97 {
  position: fixed;
  top: 60px;
  left: 16px;
  width: 220px;
  z-index: 100;
  font-family: "Arial", sans-serif;
  box-shadow: inset -1px -1px #0a0a0a, inset 1px 1px #dfdfdf, inset -2px -2px grey, inset 2px 2px #ffffff;
  background: #c0c0c0;
  cursor: default;
  user-select: none;
}

/* barre de titre */
#win97-titlebar {
  background: linear-gradient(to right, #000080, #1084d0);
  color: #ffffff;
  font-size: 11px;
  font-weight: bold;
  padding: 3px 4px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: move;
}
#win97-titlebar-text {
  display: flex;
  align-items: center;
  gap: 4px;
}
#win97-titlebar-text::before {
  content: "💬";
  font-size: 10px;
}
#win97-btns {
  display: flex;
  gap: 2px;
}
.win97-btn {
  width: 16px;
  height: 14px;
  background: #c0c0c0;
  border: none;
  font-size: 8px;
  font-weight: bold;
  line-height: 1;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: inset -1px -1px #0a0a0a, inset 1px 1px #ffffff, inset -2px -2px grey, inset 2px 2px #dfdfdf;
  color: #111;
  font-family: Arial, sans-serif;
}
.win97-btn:active {
  box-shadow: inset 1px 1px #0a0a0a, inset -1px -1px #ffffff;
}

/* corps */
#win97-body {
  padding: 6px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

/* zone messages — style textarea sunken */
#win97-messages {
  height: 160px;
  overflow-y: auto;
  background: #ffffff;
  border: none;
  box-shadow: inset -1px -1px #ffffff, inset 1px 1px #808080, inset -2px -2px #dfdfdf, inset 2px 2px #0a0a0a;
  padding: 4px;
  font-family: "Courier New", monospace;
  font-size: 10px;
  line-height: 1.5;
  color: #111;
}
#win97-messages .msg-entry { margin-bottom: 5px; border-bottom: 1px dotted #ccc; padding-bottom: 4px; }
#win97-messages .msg-pseudo { font-weight: bold; color: #000080; }
#win97-messages .msg-date { color: #808080; font-size: 9px; }
#win97-messages .msg-text { color: #111; margin-top: 1px; word-break: break-word; }

/* séparateur */
.win97-separator {
  height: 2px;
  box-shadow: inset 0 1px #808080, inset 0 2px #ffffff;
  margin: 2px 0;
}

/* label + input style */
.win97-label {
  font-size: 10px;
  color: #111;
  font-family: Arial, sans-serif;
  margin-bottom: 1px;
}
#win97-pseudo {
  width: 100%;
  font-size: 10px;
  font-family: "Courier New", monospace;
  padding: 2px 3px;
  background: #ffffff;
  border: none;
  box-shadow: inset -1px -1px #ffffff, inset 1px 1px #808080, inset -2px -2px #dfdfdf, inset 2px 2px #0a0a0a;
  outline: none;
  color: #111;
}
#win97-msg {
  width: 100%;
  height: 44px;
  font-size: 10px;
  font-family: "Courier New", monospace;
  padding: 2px 3px;
  background: #ffffff;
  border: none;
  box-shadow: inset -1px -1px #ffffff, inset 1px 1px #808080, inset -2px -2px #dfdfdf, inset 2px 2px #0a0a0a;
  outline: none;
  resize: none;
  color: #111;
}

/* bouton send style win97 */
#win97-send {
  align-self: flex-end;
  background: #c0c0c0;
  border: none;
  box-shadow: inset -1px -1px #0a0a0a, inset 1px 1px #ffffff, inset -2px -2px grey, inset 2px 2px #dfdfdf;
  font-family: Arial, sans-serif;
  font-size: 11px;
  padding: 3px 14px;
  cursor: pointer;
  color: #111;
  letter-spacing: 0;
}
#win97-send:active {
  box-shadow: inset 1px 1px #0a0a0a, inset -1px -1px #ffffff;
  padding: 4px 13px 2px 15px;
}

/* CENTRE — albums */
#col-main {
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:60px 40px 60px 40px;
}

#albums-label {
  font-size:28px;
  letter-spacing:6px;
  text-transform:uppercase;
  color:#111;
  margin-bottom:40px;
  font-weight:normal;
}

#album-grid {
  display:flex;
  flex-direction:row;
  gap:40px;
  flex-wrap:wrap;
  justify-content:center;
}

.album-card {
  display:flex;
  flex-direction:column;
  align-items:center;
  cursor:pointer;
  width:180px;
  text-decoration:none;
  color:#111;
}

.album-card img {
  width:180px;
  height:180px;
  object-fit:contain;
  display:block;
  background:#f5f5f5;
  transition:opacity 0.2s;
}
.album-card:hover img { opacity:0.7; }

.album-card-title {
  font-size:9px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:rgba(0,0,0,0.5);
  margin-top:8px;
  text-align:center;
}
.album-card-artist {
  font-size:9px;
  letter-spacing:1px;
  color:rgba(0,0,0,0.3);
  margin-top:3px;
  text-align:center;
}

@media (max-width:700px) {
  #page { flex-direction:column; }
  #col-bbs { width:100%; border-right:none; border-bottom:1px solid rgba(0,0,0,0.05); padding:50px 16px 16px 16px; }
  #bbs-messages { height:120px; }
  #col-main { padding:30px 20px 60px 20px; }
  #albums-label { font-size:20px; }
  .album-card { width:140px; }
  .album-card img { width:140px; height:140px; }
}
</style>
</head>
<body>

<a id="back" href="./index.html">← accueil</a>
<a id="donate" href="https://buymeacoffee.com/slyrame" target="_blank" rel="noopener">☕ donate</a>

<div id="page">

<!-- FENETRE WINDOWS 97 BBS -->
<div id="win97">
  <div id="win97-titlebar" onmousedown="startDrag(event)">
    <div id="win97-titlebar-text">messages</div>
    <div id="win97-btns">
      <button class="win97-btn" onclick="toggleMin()">_</button>
      <button class="win97-btn">□</button>
      <button class="win97-btn" style="color:#c0c0c0;background:#c0c0c0;font-weight:bold;" onclick="toggleMin()">✕</button>
    </div>
  </div>
  <div id="win97-body">
    <div id="win97-messages"></div>
    <div class="win97-separator"></div>
    <div class="win97-label">Pseudo :</div>
    <input type="text" id="pseudo" id="win97-pseudo" placeholder="VotreNom" style="width:100%;font-size:10px;font-family:'Courier New',monospace;padding:2px 3px;background:#fff;border:none;box-shadow:inset -1px -1px #fff,inset 1px 1px #808080,inset -2px -2px #dfdfdf,inset 2px 2px #0a0a0a;outline:none;">
    <div class="win97-label" style="margin-top:4px;">Message :</div>
    <textarea id="msg" style="width:100%;height:44px;font-size:10px;font-family:'Courier New',monospace;padding:2px 3px;background:#fff;border:none;box-shadow:inset -1px -1px #fff,inset 1px 1px #808080,inset -2px -2px #dfdfdf,inset 2px 2px #0a0a0a;outline:none;resize:none;"></textarea>
    <button id="win97-send" onclick="poster()">Envoyer</button>
  </div>
</div>

  <div id="col-main">
    <div id="albums-label">Albums</div>
    <div id="album-grid"></div>
  </div>

</div>

<script>
var ALBUMS = [
  {
    id: "untilted",
    titre: "untilted project",
    cover: "untilted.jpg",
    artiste: "slyrame & romancandle",
    annee: "",
    tracks: [
      { titre: "1", src: "1.mp3" },
      { titre: "1 (pitched version)", src: "untiltedpitch.mp3" },
    ]
  },
  {
    id: "samsara",
    titre: "samsara",
    cover: "samsara.jpg",
    artiste: "slyrame",
    annee: "",
    tracks: [
      { titre: "a",                            src: "a.mp3" },
      { titre: "dans le noir du temps",        src: "dans_le_noir_du_temps.mp3" },
      { titre: "roman candle cover",           src: "roman_candle_cover.mp3" },
      { titre: "i believe i'll dust my broom", src: "i_believe_ill_dust_my_broom.mp3" },
      { titre: "IMG_3403",                     src: "IMG_3403.mp3" },
    ]
  },
];

// Stocker les données dans sessionStorage pour la page album
function initGrid() {
  sessionStorage.setItem('slyrame_albums', JSON.stringify(ALBUMS));
  var grid = document.getElementById('album-grid');
  grid.innerHTML = '';
  ALBUMS.forEach(function(album, i) {
    var card = document.createElement('a');
    card.className = 'album-card';
    var pages = ['untilted.html', 'samsara.html'];
    card.href = pages[i] || 'album.html?i=' + i;

    var img = document.createElement('img');
    img.src = album.cover || '';
    img.alt = album.titre;

    var title = document.createElement('div');
    title.className = 'album-card-title';
    title.textContent = album.titre;

    var artist = document.createElement('div');
    artist.className = 'album-card-artist';
    artist.textContent = album.artiste;

    card.appendChild(img);
    card.appendChild(title);
    card.appendChild(artist);
    grid.appendChild(card);
  });
}

// BBS Firebase
var DB_URL = "https://test-a3c23-default-rtdb.europe-west1.firebasedatabase.app/messages";
function initFirebase() { chargerFirebase(); setInterval(chargerFirebase, 3000); }
function chargerFirebase() {
  fetch(DB_URL+'.json').then(function(r){ return r.json(); }).then(function(data) {
    var msgs = [];
    if (data) { Object.keys(data).forEach(function(k){ msgs.push(data[k]); }); msgs.sort(function(a,b){ return a.ts-b.ts; }); }
    afficher(msgs);
  }).catch(function(){});
}
function afficher(msgs) {
  var c = document.getElementById('win97-messages');
  if (!msgs||!msgs.length) { c.innerHTML='<div style="color:#808080;font-size:9px;font-style:italic;">aucun message</div>'; return; }
  var h='';
  for (var i=msgs.length-1;i>=0;i--) {
    var m=msgs[i];
    h+='<div class="msg-entry"><span class="msg-pseudo">'+x(m.p)+'</span> <span class="msg-date">'+m.d+'</span><div class="msg-text">'+x(m.t).replace(/\n/g,'<br>')+'</div></div>';
  }
  c.innerHTML=h;
}

// DRAG FENETRE
var dragActive = false, dragOX, dragOY, winX = 16, winY = 60;
function startDrag(e) {
  dragActive = true;
  winX = parseInt(document.getElementById('win97').style.left || 16);
  winY = parseInt(document.getElementById('win97').style.top  || 60);
  dragOX = e.clientX; dragOY = e.clientY;
  e.preventDefault();
}
document.addEventListener('mousemove', function(e) {
  if (!dragActive) return;
  var dx = e.clientX - dragOX, dy = e.clientY - dragOY;
  document.getElementById('win97').style.left = (winX + dx) + 'px';
  document.getElementById('win97').style.top  = (winY + dy) + 'px';
});
document.addEventListener('mouseup', function() { dragActive = false; });

// MINIMIZE
var minimized = false;
function toggleMin() {
  minimized = !minimized;
  document.getElementById('win97-body').style.display = minimized ? 'none' : 'flex';
}
function x(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function poster() {
  var p=document.getElementById('pseudo').value.trim();
  var t=document.getElementById('msg').value.trim();
  if (!p||!t) return;
  var now=new Date();
  var d=now.toLocaleDateString('fr-FR')+' '+now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  fetch(DB_URL+'.json',{method:'POST',body:JSON.stringify({p:p,t:t,d:d,ts:Date.now()})})
    .then(function(){ document.getElementById('msg').value=''; chargerFirebase(); });
}

window.onload = function(){ initGrid(); initFirebase(); };
</script>
</body>
</html>
