<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>????</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width: 100%;
  min-height: 100vh;
  background: #ffffff;
  font-family: "Courier New", monospace;
  color: #111111;
  display: flex;
  align-items: center;
  justify-content: center;
}

#back {
  position: fixed;
  top: 14px;
  left: 20px;
  font-size: 11px;
  color: #111111;
  text-decoration: none;
  letter-spacing: 2px;
}
#back:hover { color: #111111; }

/* ---- ECRAN MOT DE PASSE ---- */
#screen-pwd {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
}

#screen-pwd .label {
  font-size: 11px;
  color: #111111;
  letter-spacing: 4px;
}

#pwd-input {
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(0,0,0,0.35);
  color: #111111;
  font-family: "Courier New", monospace;
  font-size: 18px;
  letter-spacing: 6px;
  width: 200px;
  text-align: center;
  outline: none;
  padding: 4px 0;
}

#pwd-input::placeholder { color: #111111; letter-spacing: 4px; color: #111111; }

#pwd-btn {
  background: transparent;
  border: 1px solid rgba(0,0,0,0.35);
  color: #111111;
  font-family: "Courier New", monospace;
  font-size: 12px;
  letter-spacing: 3px;
  padding: 5px 20px;
  cursor: pointer;
}
#pwd-btn:hover { background: rgba(0,0,0,0.06); }

#pwd-error {
  font-size: 11px;
  color: #111111;
  letter-spacing: 2px;
  min-height: 16px;
}

/* ---- GALERIE PHOTOS ---- */
#screen-gallery {
  display: none;
  width: 100%;
  min-height: 100vh;
  padding: 60px 30px 60px 30px;
  align-items: flex-start;
  justify-content: center;
  flex-wrap: wrap;
  gap: 16px;
}

#screen-gallery img {
  max-width: 320px;
  max-height: 320px;
  object-fit: cover;
  opacity: 0.88;
  display: block;
  cursor: pointer;
  transition: opacity 0.15s;
}
#screen-gallery img:hover { opacity: 1; }

/* ---- LIGHTBOX ---- */
#lightbox {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(255,255,255,0.95);
  align-items: center;
  justify-content: center;
  z-index: 100;
  cursor: pointer;
}
@media (max-width: 600px) {
  #pwd-input { font-size: 15px; width: 160px; }
  #screen-gallery img { max-width: 90vw; max-height: 90vw; }
}

#lightbox img {
  max-width: 90vw;
  max-height: 90vh;
  object-fit: contain;
  display: block;
}
</style>
</head>
<body>

<a id="back" href="index.html">← accueil</a>

<!-- ECRAN MOT DE PASSE -->
<div id="screen-pwd">
  <div class="label">????</div>
  <input type="password" id="pwd-input" placeholder="· · · · · ·" autofocus>
  <button id="pwd-btn" onclick="verifier()">entrer</button>
  <div id="pwd-error"></div>
</div>

<!-- GALERIE (cachée jusqu'au bon mot de passe) -->
<div id="screen-gallery"></div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" src="" alt="">
</div>

<script>
// =====================================================
//  MOT DE PASSE — change-le ici
// =====================================================
var PASSWORD = "lilougosden13112006_*searchinglove";
// =====================================================

// =====================================================
//  PHOTOS — ajoute tes photos ici
//  Place les fichiers dans le même dossier
// =====================================================
var PHOTOS = [
  // "photo1.jpg",
  // "photo2.jpg",
  // "photo3.png",
];
// =====================================================

document.getElementById('pwd-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') verifier();
});

function verifier() {
  var val = document.getElementById('pwd-input').value;
  if (val === PASSWORD) {
    document.getElementById('screen-pwd').style.display = 'none';
    ouvrirGalerie();
  } else {
    var err = document.getElementById('pwd-error');
    err.textContent = 'incorrect';
    document.getElementById('pwd-input').value = '';
    setTimeout(function(){ err.textContent = ''; }, 1500);
  }
}

function ouvrirGalerie() {
  var g = document.getElementById('screen-gallery');
  g.style.display = 'flex';
  document.body.style.alignItems = 'flex-start';
  document.body.style.justifyContent = 'center';

  if (!PHOTOS.length) {
    g.innerHTML = '<p style="color:rgba(255,255,255,0.2);font-size:12px;letter-spacing:2px;margin-top:40px;">aucune photo.</p>';
    return;
  }

  PHOTOS.forEach(function(src) {
    var img = document.createElement('img');
    img.src = src;
    img.alt = '';
    img.onclick = function(){ openLightbox(src); };
    g.appendChild(img);
  });
}

function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').style.display = 'flex';
}

function closeLightbox() {
  document.getElementById('lightbox').style.display = 'none';
  document.getElementById('lightbox-img').src = '';
}

window.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeLightbox();
});
</script>
</body>
</html>
