<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="favicon.ico">
<title>[ slyrame ] — music</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; min-height:100vh; background:#ffffff; font-family:"Courier New",monospace; color:#111111; overflow-x:hidden; }

#back { position:fixed; top:14px; left:20px; font-size:11px; color:#111111; text-decoration:none; letter-spacing:2px; z-index:20; }
#back:hover { opacity:0.5; }
#donate { position:fixed; bottom:18px; right:20px; font-size:10px; color:#111111; text-decoration:none; letter-spacing:2px; border:1px solid rgba(0,0,0,0.12); padding:5px 10px; z-index:20; transition:opacity 0.2s; }
#donate:hover { opacity:0.5; }

/* ---- LAYOUT ---- */
#page {
  display:flex;
  flex-direction:row;
  min-height:100vh;
  width:100%;
}

/* BBS — petit, fixé à gauche */
#col-bbs {
  width:180px;
  min-width:140px;
  flex-shrink:0;
  padding:60px 12px 24px 16px;
  display:flex;
  flex-direction:column;
  gap:6px;
  border-right:1px solid rgba(0,0,0,0.05);
}

#bbs-messages {
  height:200px;
  overflow-y:auto;
  font-size:10px;
  line-height:1.6;
  scrollbar-width:none;
  color:rgba(0,0,0,0.6);
}
#bbs-messages::-webkit-scrollbar { display:none; }
.msg-entry { margin-bottom:8px; }
.msg-pseudo { font-weight:bold; font-size:10px; color:#111; }
.msg-date { color:rgba(0,0,0,0.28); font-size:9px; }
.msg-text { font-size:10px; margin-top:1px; word-break:break-word; }

#col-bbs input[type="text"], #col-bbs textarea {
  background:transparent; border:none; border-bottom:1px solid rgba(0,0,0,0.2);
  color:#111111; font-family:"Courier New",monospace; font-size:10px;
  width:100%; outline:none; padding:2px 2px;
}
#col-bbs textarea { height:40px; resize:none; margin-top:4px; border:1px solid rgba(0,0,0,0.15); padding:3px; font-size:10px; }
#col-bbs button {
  background:transparent; border:1px solid rgba(0,0,0,0.3); color:#111111;
  font-family:"Courier New",monospace; font-size:9px; cursor:pointer;
  padding:3px 10px; margin-top:4px; letter-spacing:1px; width:fit-content;
}
#col-bbs button:hover { background:rgba(0,0,0,0.04); }
#bbs-label { font-size:9px; color:rgba(0,0,0,0.28); letter-spacing:2px; margin-bottom:4px; }

/* CENTRE — albums */
#col-main {
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:60px 40px 60px 40px;
}

#albums-label {
  font-size:28px;
  letter-spacing:6px;
  text-transform:uppercase;
  color:#111;
  margin-bottom:40px;
  font-weight:normal;
}

#album-grid {
  display:flex;
  flex-direction:row;
  gap:40px;
  flex-wrap:wrap;
  justify-content:center;
}

.album-card {
  display:flex;
  flex-direction:column;
  align-items:center;
  cursor:pointer;
  width:180px;
  text-decoration:none;
  color:#111;
}

.album-card img {
  width:180px;
  height:180px;
  object-fit:contain;
  display:block;
  background:#f5f5f5;
  transition:opacity 0.2s;
}
.album-card:hover img { opacity:0.7; }

.album-card-title {
  font-size:9px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:rgba(0,0,0,0.5);
  margin-top:8px;
  text-align:center;
}
.album-card-artist {
  font-size:9px;
  letter-spacing:1px;
  color:rgba(0,0,0,0.3);
  margin-top:3px;
  text-align:center;
}

@media (max-width:700px) {
  #page { flex-direction:column; }
  #col-bbs { width:100%; border-right:none; border-bottom:1px solid rgba(0,0,0,0.05); padding:50px 16px 16px 16px; }
  #bbs-messages { height:120px; }
  #col-main { padding:30px 20px 60px 20px; }
  #albums-label { font-size:20px; }
  .album-card { width:140px; }
  .album-card img { width:140px; height:140px; }
}
</style>
</head>
<body>

<a id="back" href="./index.html">← accueil</a>
<a id="donate" href="https://buymeacoffee.com/slyrame" target="_blank" rel="noopener">☕ donate</a>

<div id="page">

  <div id="col-bbs">
    <div id="bbs-label">messages</div>
    <div id="bbs-messages"></div>
    <input type="text" id="pseudo" placeholder="pseudo">
    <textarea id="msg" placeholder="message..."></textarea>
    <button onclick="poster()">SEND</button>
  </div>

  <div id="col-main">
    <div id="albums-label">Albums</div>
    <div id="album-grid"></div>
  </div>

</div>

<script>
var ALBUMS = [
  {
    id: "untilted",
    titre: "untilted project",
    cover: "untilted.jpg",
    artiste: "slyrame & romancandle",
    annee: "",
    tracks: [
      { titre: "1", src: "1.mp3" },
      { titre: "1 (pitched version)", src: "untiltedpitch.mp3" },
    ]
  },
  {
    id: "samsara",
    titre: "samsara",
    cover: "samsara.jpg",
    artiste: "slyrame",
    annee: "",
    tracks: [
      { titre: "a",                            src: "a.mp3" },
      { titre: "dans le noir du temps",        src: "dans_le_noir_du_temps.mp3" },
      { titre: "roman candle cover",           src: "roman_candle_cover.mp3" },
      { titre: "i believe i'll dust my broom", src: "i_believe_ill_dust_my_broom.mp3" },
      { titre: "IMG_3403",                     src: "IMG_3403.mp3" },
    ]
  },
];

// Stocker les données dans sessionStorage pour la page album
function initGrid() {
  sessionStorage.setItem('slyrame_albums', JSON.stringify(ALBUMS));
  var grid = document.getElementById('album-grid');
  grid.innerHTML = '';
  ALBUMS.forEach(function(album, i) {
    var card = document.createElement('a');
    card.className = 'album-card';
    var pages = ['untilted.html', 'samsara.html'];
    card.href = pages[i] || 'album.html?i=' + i;

    var img = document.createElement('img');
    img.src = album.cover || '';
    img.alt = album.titre;

    var title = document.createElement('div');
    title.className = 'album-card-title';
    title.textContent = album.titre;

    var artist = document.createElement('div');
    artist.className = 'album-card-artist';
    artist.textContent = album.artiste;

    card.appendChild(img);
    card.appendChild(title);
    card.appendChild(artist);
    grid.appendChild(card);
  });
}

// BBS Firebase
var DB_URL = "https://test-a3c23-default-rtdb.europe-west1.firebasedatabase.app/messages";
function initFirebase() { chargerFirebase(); setInterval(chargerFirebase, 3000); }
function chargerFirebase() {
  fetch(DB_URL+'.json').then(function(r){ return r.json(); }).then(function(data) {
    var msgs = [];
    if (data) { Object.keys(data).forEach(function(k){ msgs.push(data[k]); }); msgs.sort(function(a,b){ return a.ts-b.ts; }); }
    afficher(msgs);
  }).catch(function(){});
}
function afficher(msgs) {
  var c = document.getElementById('bbs-messages');
  if (!msgs||!msgs.length) { c.innerHTML='<div style="color:rgba(0,0,0,0.28);font-size:9px;font-style:italic;">aucun message</div>'; return; }
  var h='';
  for (var i=msgs.length-1;i>=0;i--) {
    var m=msgs[i];
    h+='<div class="msg-entry"><span class="msg-pseudo">'+x(m.p)+'</span> <span class="msg-date">'+m.d+'</span><div class="msg-text">'+x(m.t).replace(/\n/g,'<br>')+'</div></div>';
  }
  c.innerHTML=h;
}
function x(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function poster() {
  var p=document.getElementById('pseudo').value.trim();
  var t=document.getElementById('msg').value.trim();
  if (!p||!t) return;
  var now=new Date();
  var d=now.toLocaleDateString('fr-FR')+' '+now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  fetch(DB_URL+'.json',{method:'POST',body:JSON.stringify({p:p,t:t,d:d,ts:Date.now()})})
    .then(function(){ document.getElementById('msg').value=''; chargerFirebase(); });
}

window.onload = function(){ initGrid(); initFirebase(); };
</script>
</body>
</html>
